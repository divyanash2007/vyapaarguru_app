<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<script>if(localStorage.getItem('apnidukaan-theme')==='light')document.documentElement.classList.add('light');</script>
<title>ApniDukaan — Loading</title>
<link rel="stylesheet" href="css/tokens.css">
<style>
body { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }

.splash-content {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  gap: 32px;
  height: 100%;
  padding: 60px 40px;
}

.logo-large {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
}

.logo-icon {
  width: 80px;
  height: 80px;
  background: var(--accent);
  border-radius: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 8px 32px rgba(255,107,53,0.3);
  animation: pulse 2s ease-in-out infinite;
}

.logo-icon svg {
  width: 44px;
  height: 44px;
  color: #fff;
}

.logo-text {
  font-size: 32px;
  font-weight: 700;
  color: var(--fg);
}

.logo-text span {
  color: var(--accent);
}

.tagline {
  font-size: 16px;
  color: var(--fg-muted);
  max-width: 280px;
  line-height: 1.5;
}

.loading-area {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
}

.loading-dots {
  display: flex;
  gap: 8px;
}

.dot {
  width: 8px;
  height: 8px;
  background: var(--accent);
  border-radius: 50%;
  animation: bounce 1.4s ease-in-out infinite both;
}

.dot:nth-child(1) { animation-delay: -0.32s; }
.dot:nth-child(2) { animation-delay: -0.16s; }
.dot:nth-child(3) { animation-delay: 0s; }

.loading-text {
  font-size: 14px;
  color: var(--fg-muted);
  font-weight: 500;
}

.version-info {
  position: absolute;
  bottom: 32px;
  left: 50%;
  transform: translateX(-50%);
  font-family: var(--mono);
  font-size: 11px;
  color: var(--fg-muted);
  letter-spacing: 1px;
  text-transform: uppercase;
}

@keyframes pulse {
  0%, 100% { transform: scale(1); box-shadow: 0 8px 32px rgba(255,107,53,0.3); }
  50% { transform: scale(1.05); box-shadow: 0 12px 40px rgba(255,107,53,0.5); }
}

@keyframes bounce {
  0%, 80%, 100% { transform: scale(0); }
  40% { transform: scale(1); }
}

.fade-out {
  animation: fadeOut 0.5s ease-out forwards;
}

@keyframes fadeOut {
  from { opacity: 1; }
  to { opacity: 0; }
}
</style>
</head>
<body>

<div class="phone-frame">
  <!-- Status bar -->
  <div class="status-bar">
    <span>9:41</span>
    <div class="punch"></div>
    <div class="status-icons">
      <span>📶</span>
      <span>📶</span>
      <span>🔋</span>
    </div>
  </div>

  <!-- Theme toggle -->
  <div style="position:absolute;top:36px;right:16px;z-index:10;">
    <button class="theme-toggle" aria-label="Toggle theme">
      <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
    </button>
  </div>

  <!-- Splash content -->
  <div class="screen-body">
    <div class="splash-content">
      <div class="logo-large">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/>
            <line x1="3" y1="6" x2="21" y2="6"/>
            <path d="M16 10a4 4 0 0 1-8 0"/>
          </svg>
        </div>
        <div class="logo-text">Apni<span>Dukaan</span></div>
      </div>

      <div class="tagline">
        Manage your shop.<br>
        Grow your business.
      </div>

      <div class="loading-area">
        <div class="loading-dots">
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
        </div>
        <div class="loading-text">Loading your dashboard...</div>
      </div>

      <div style="margin-top: 20px;">
        <a href="index.html" style="
          padding: 8px 16px;
          border-radius: var(--r-pill);
          border: 1px solid rgba(255,107,53,0.4);
          color: var(--accent);
          text-decoration: none;
          font-size: 13px;
          font-weight: 600;
          transition: all 0.2s;
        ">Join Waitlist</a>
      </div>
    </div>

    <div class="version-info">v1.0.0 • Build 2024</div>
  </div>

  <!-- Android nav bar -->
  <div class="android-nav">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M3 12h18m-9-9v18"/>
    </svg>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="10"/>
    </svg>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <polygon points="11 19 2 12 11 5 11 19"/>
    </svg>
  </div>
</div>

<script src="js/shared.js"></script>
<script>
// Auto-redirect to login after 3 seconds
setTimeout(() => {
  document.body.classList.add('fade-out');
  setTimeout(() => {
    window.location.href = 'onboarding.html';
  }, 500);
}, 3000);
</script>

</body>
</html>
