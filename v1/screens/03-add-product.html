<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<script>if(localStorage.getItem('apnidukaan-theme')==='light')document.documentElement.classList.add('light');</script>
<title>Add Product — ApniDukaan</title>
<link rel="stylesheet" href="../css/tokens.css">
<style>
body { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:24px; }
.scan-trigger { display:flex; align-items:center; gap:10px; background:var(--surface2); border:1.5px dashed var(--accent); border-radius:var(--r-md); padding:14px; cursor:pointer; margin-bottom:16px; transition:background 0.15s; }
.scan-trigger:hover { background:rgba(0,237,100,0.06); }
.scan-trigger svg { width:28px; height:28px; color:var(--accent); flex-shrink:0; }
.scan-trigger .st-text { flex:1; }
.scan-trigger .st-title { font-size:14px; font-weight:600; color:var(--accent); }
.scan-trigger .st-sub { font-size:12px; color:var(--fg-muted); margin-top:2px; }
.barcode-result { background:rgba(0,237,100,0.08); border:1px solid rgba(0,237,100,0.3); border-radius:var(--r-sm); padding:10px 12px; margin-bottom:14px; display:none; }
.barcode-result.show { display:flex; align-items:center; gap:8px; }
.barcode-result .br-code { font-family:var(--mono); font-size:13px; color:var(--accent); flex:1; }
.price-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.photo-upload { border:1.5px dashed var(--border); border-radius:var(--r-md); height:80px; display:flex; align-items:center; justify-content:center; gap:8px; cursor:pointer; color:var(--fg-muted); font-size:13px; margin-bottom:14px; }
.photo-upload:hover { border-color:var(--accent); color:var(--accent); }
</style>
</head>
<body>
<div class="phone-frame">
  <div class="status-bar">
    <span>9:41</span><div class="punch"></div>
    <div class="status-icons">
      <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4 2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></svg>
      <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M15.67 4H14V2h-4v2H8.33C7.6 4 7 4.6 7 5.33v15.33C7 21.4 7.6 22 8.33 22h7.33c.74 0 1.34-.6 1.34-1.33V5.33C17 4.6 16.4 4 15.67 4z"/></svg>
    </div>
  </div>

  <div class="top-bar">
    <a href="02-inventory.html" class="back-btn">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
    </a>
    <div class="title">Add Product</div>
    <button class="theme-toggle" aria-label="Toggle theme">
      <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
    </button>
  </div>

  <div class="screen-body">
    <!-- Barcode scan trigger -->
    <div class="scan-trigger" onclick="openScanner(fillBarcode)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="5" height="5"/><rect x="16" y="3" width="5" height="5"/>
        <rect x="3" y="16" width="5" height="5"/>
        <path d="M21 16h-3v3M18 21h3M16 16v5M21 21v-2"/>
        <line x1="9" y1="5" x2="9" y2="19"/><line x1="12" y1="5" x2="12" y2="19"/>
      </svg>
      <div class="st-text">
        <div class="st-title">Scan Barcode</div>
        <div class="st-sub">Auto-fill product details from barcode</div>
      </div>
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
    </div>

    <!-- Barcode result (shown after scan) -->
    <div class="barcode-result" id="barcode-result">
      <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor" style="color:var(--accent)"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
      <span class="br-code" id="barcode-val">—</span>
      <span style="font-size:12px;color:var(--fg-muted)">Scanned</span>
    </div>

    <!-- Form -->
    <div class="input-group">
      <label>Product Name</label>
      <input type="text" id="prod-name" placeholder="e.g. Tata Salt 500g">
    </div>

    <div class="input-group">
      <label>Category</label>
      <select>
        <option value="">Select category</option>
        <option>Grocery</option>
        <option>Beverages</option>
        <option>Snacks</option>
        <option>Personal Care</option>
        <option>Dairy</option>
        <option>Household</option>
      </select>
    </div>

    <div class="price-row">
      <div class="input-group">
        <label>Purchase Price (₹)</label>
        <input type="number" id="buy-price" placeholder="0.00">
      </div>
      <div class="input-group">
        <label>Selling Price (₹)</label>
        <input type="number" id="sell-price" placeholder="0.00">
      </div>
    </div>

    <div class="input-group">
      <label>Opening Stock (units)</label>
      <input type="number" id="stock-qty" placeholder="0">
    </div>

    <div class="input-group">
      <label>Low Stock Alert (units)</label>
      <input type="number" placeholder="5">
    </div>

    <div class="input-group">
      <label>Unit</label>
      <select>
        <option>Piece</option>
        <option>Kg</option>
        <option>Gram</option>
        <option>Litre</option>
        <option>Ml</option>
        <option>Pack</option>
        <option>Box</option>
      </select>
    </div>

    <!-- Photo upload -->
    <div class="photo-upload">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
      Add Product Photo (optional)
    </div>

    <div class="input-group">
      <label>Notes</label>
      <textarea placeholder="Expiry date, supplier info, etc."></textarea>
    </div>

    <button class="btn btn-primary btn-full" onclick="saveProduct()">
      <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Save Product
    </button>
    <div style="height:16px"></div>
  </div>

  <!-- Scanner overlay -->
  <div id="scanner-overlay" class="scanner-overlay" style="display:none">
    <div class="scanner-close" onclick="closeScanner()">✕</div>
    <div class="scanner-viewport">
      <div class="scanner-line"></div>
      <div class="scanner-corner tl"></div><div class="scanner-corner tr"></div>
      <div class="scanner-corner bl"></div><div class="scanner-corner br"></div>
    </div>
    <div class="scanner-label">Point camera at product barcode<br><span style="font-size:12px;color:var(--fg-muted)">Scanning automatically…</span></div>
  </div>

  <div class="android-nav">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
    <svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="5"/></svg>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
  </div>
</div>
<script src="../js/shared.js"></script>
<script>
const PRODUCTS = {
  '8901030874628': { name: 'Tata Salt 500g', buy: 18, sell: 22 },
  '8906002480012': { name: 'Fortune Sunflower Oil 1L', buy: 130, sell: 145 },
  '8901719110023': { name: 'India Gate Basmati 1kg', buy: 105, sell: 120 },
  '8901058851019': { name: 'Dove Soap 100g', buy: 40, sell: 48 },
  '8901030874635': { name: 'Coca-Cola 600ml', buy: 32, sell: 40 },
};

function fillBarcode(code) {
  document.getElementById('barcode-val').textContent = code;
  document.getElementById('barcode-result').classList.add('show');
  const p = PRODUCTS[code];
  if (p) {
    document.getElementById('prod-name').value = p.name;
    document.getElementById('buy-price').value = p.buy;
    document.getElementById('sell-price').value = p.sell;
  }
}

function saveProduct() {
  const name = document.getElementById('prod-name').value.trim();
  if (!name) { alert('Please enter a product name'); return; }
  // Show success feedback
  const btn = document.querySelector('.btn-primary');
  btn.textContent = '✓ Saved!';
  btn.style.background = 'var(--accent)';
  btn.style.color = '#000';
  setTimeout(() => { window.location.href = '02-inventory.html'; }, 800);
}
</script>
</body>
</html>
