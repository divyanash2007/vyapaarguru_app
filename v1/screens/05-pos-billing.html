<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<script>if(localStorage.getItem('apnidukaan-theme')==='light')document.documentElement.classList.add('light');</script>
<title>POS Billing — ApniDukaan</title>
<link rel="stylesheet" href="../css/tokens.css">
<style>
body { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:24px; }
.pos-layout { display:flex; flex-direction:column; height:100%; }
.scan-strip { display:flex; gap:8px; padding:10px 16px; background:var(--surface); border-bottom:1px solid var(--border); flex-shrink:0; }
.scan-strip input { flex:1; background:var(--surface2); border:1px solid var(--border); border-radius:var(--r-sm); color:var(--fg); font-family:var(--font); font-size:14px; padding:9px 12px; outline:none; }
.scan-strip input:focus { border-color:var(--accent); }
.scan-strip .scan-btn { background:var(--accent-dk); border:none; border-radius:var(--r-sm); color:#fff; padding:0 14px; cursor:pointer; display:flex; align-items:center; gap:6px; font-size:13px; font-weight:600; white-space:nowrap; }
.bill-area { flex:1; overflow-y:auto; padding:12px 16px; scrollbar-width:none; }
.bill-area::-webkit-scrollbar { display:none; }
.bill-item { display:flex; align-items:center; gap:10px; padding:10px 0; border-bottom:1px solid var(--border); }
.bill-item:last-child { border-bottom:none; }
.bi-name { flex:1; font-size:13px; font-weight:500; }
.bi-price { font-size:13px; color:var(--fg-muted); }
.bi-total { font-size:14px; font-weight:600; min-width:52px; text-align:right; }
.bi-del { width:28px; height:28px; background:none; border:none; color:var(--danger); cursor:pointer; display:flex; align-items:center; justify-content:center; border-radius:4px; }
.bi-del:hover { background:rgba(244,67,54,0.1); }
.checkout-panel { background:var(--surface); border-top:1px solid var(--border); padding:12px 16px; flex-shrink:0; }
.checkout-row { display:flex; justify-content:space-between; font-size:13px; color:var(--fg-muted); margin-bottom:6px; }
.checkout-total { display:flex; justify-content:space-between; font-size:18px; font-weight:700; margin-bottom:12px; }
.checkout-btns { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.empty-state { text-align:center; padding:40px 20px; color:var(--fg-muted); }
.empty-state svg { width:48px; height:48px; margin-bottom:12px; opacity:0.4; }
.empty-state p { font-size:14px; }
.customer-row { display:flex; align-items:center; gap:8px; padding:8px 16px; background:var(--surface); border-bottom:1px solid var(--border); flex-shrink:0; }
.customer-row input { flex:1; background:var(--surface2); border:1px solid var(--border); border-radius:var(--r-sm); color:var(--fg); font-family:var(--font); font-size:13px; padding:7px 10px; outline:none; }
.customer-row input:focus { border-color:var(--accent); }
.customer-row label { font-size:12px; color:var(--fg-muted); white-space:nowrap; }
</style>
</head>
<body>
<div class="phone-frame">
  <div class="status-bar">
    <span>9:41</span><div class="punch"></div>
    <div class="status-icons">
      <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4 2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></svg>
      <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M15.67 4H14V2h-4v2H8.33C7.6 4 7 4.6 7 5.33v15.33C7 21.4 7.6 22 8.33 22h7.33c.74 0 1.34-.6 1.34-1.33V5.33C17 4.6 16.4 4 15.67 4z"/></svg>
    </div>
  </div>

  <div class="top-bar">
    <a href="01-dashboard.html" class="back-btn">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
    </a>
    <div class="title">New Bill <span style="font-size:13px;color:var(--fg-muted);font-weight:400">#1043</span></div>
    <button onclick="clearBill()" style="background:none;border:none;color:var(--danger);font-size:12px;cursor:pointer;font-family:var(--font)">Clear</button>
    <button class="theme-toggle" aria-label="Toggle theme">
      <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
    </button>
  </div>

  <!-- Customer name -->
  <div class="customer-row">
    <label>Customer:</label>
    <input type="text" id="cust-name" placeholder="Name or phone (optional)">
  </div>

  <!-- Scan strip -->
  <div class="scan-strip">
    <input type="text" id="item-input" placeholder="Search item or scan barcode…" onkeydown="if(event.key==='Enter')addBySearch()">
    <button class="scan-btn" onclick="openScanner(addByBarcode)">
      <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="5" height="5"/><rect x="16" y="3" width="5" height="5"/>
        <rect x="3" y="16" width="5" height="5"/>
        <path d="M21 16h-3v3M18 21h3M16 16v5M21 21v-2"/>
      </svg>
      Scan
    </button>
  </div>

  <!-- Bill items -->
  <div class="bill-area" id="bill-area">
    <div class="empty-state" id="empty-state">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
      <p>Scan or search items<br>to start billing</p>
    </div>
    <div id="bill-items"></div>
  </div>

  <!-- Checkout panel -->
  <div class="checkout-panel">
    <div class="checkout-row"><span>Subtotal</span><span id="subtotal">₹0</span></div>
    <div class="checkout-row"><span>GST (5%)</span><span id="gst">₹0</span></div>
    <div class="checkout-row"><span>Discount</span>
      <span style="display:flex;align-items:center;gap:4px">
        − <input type="number" id="discount" value="0" min="0" style="width:50px;background:var(--surface2);border:1px solid var(--border);border-radius:4px;color:var(--fg);font-size:13px;padding:2px 6px;outline:none;font-family:var(--font)" onchange="updateBill()"> ₹
      </span>
    </div>
    <div class="checkout-total"><span>Total</span><span id="grand-total" style="color:var(--accent)">₹0</span></div>
    <div class="checkout-btns">
      <button class="btn btn-outline" onclick="window.location.href='06-send-bill.html'">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
        Send Bill
      </button>
      <button class="btn btn-primary" onclick="collectPayment()">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
        Collect ₹<span id="pay-btn-amt">0</span>
      </button>
    </div>
  </div>

  <!-- Scanner overlay -->
  <div id="scanner-overlay" class="scanner-overlay" style="display:none">
    <div class="scanner-close" onclick="closeScanner()">✕</div>
    <div class="scanner-viewport">
      <div class="scanner-line"></div>
      <div class="scanner-corner tl"></div><div class="scanner-corner tr"></div>
      <div class="scanner-corner bl"></div><div class="scanner-corner br"></div>
    </div>
    <div class="scanner-label">Scan product barcode<br><span style="font-size:12px;color:var(--fg-muted)">Scanning automatically…</span></div>
  </div>

  <div class="android-nav">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
    <svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="5"/></svg>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
  </div>
</div>
<script src="../js/shared.js"></script>
<script>
const CATALOG = {
  '8901030874628': { name: 'Tata Salt 500g', price: 22 },
  '8906002480012': { name: 'Fortune Sunflower Oil 1L', price: 145 },
  '8901719110023': { name: 'India Gate Basmati 1kg', price: 120 },
  '8901058851019': { name: 'Dove Soap 100g', price: 48 },
  '8901030874635': { name: 'Coca-Cola 600ml', price: 40 },
  '8901491503009': { name: 'Maggi Noodles 70g', price: 14 },
};
const SEARCH_MAP = {
  'salt': '8901030874628', 'oil': '8906002480012', 'rice': '8901719110023',
  'basmati': '8901719110023', 'soap': '8901058851019', 'dove': '8901058851019',
  'coke': '8901030874635', 'cola': '8901030874635', 'maggi': '8901491503009',
};

let billItems = [];

function addByBarcode(code) {
  const p = CATALOG[code] || { name: 'Item ' + code, price: 0 };
  const existing = billItems.find(i => i.code === code);
  if (existing) { existing.qty++; }
  else { billItems.push({ code, name: p.name, price: p.price, qty: 1 }); }
  renderBill();
}

function addBySearch() {
  const q = document.getElementById('item-input').value.trim().toLowerCase();
  const code = SEARCH_MAP[q] || Object.keys(CATALOG).find(k => CATALOG[k].name.toLowerCase().includes(q));
  if (code) { addByBarcode(code); document.getElementById('item-input').value = ''; }
}

function removeItem(code) {
  billItems = billItems.filter(i => i.code !== code);
  renderBill();
}

function changeQty(code, delta) {
  const item = billItems.find(i => i.code === code);
  if (!item) return;
  item.qty = Math.max(1, item.qty + delta);
  renderBill();
}

function renderBill() {
  const container = document.getElementById('bill-items');
  const empty = document.getElementById('empty-state');
  empty.style.display = billItems.length ? 'none' : 'block';
  container.innerHTML = billItems.map(item => `
    <div class="bill-item">
      <div style="flex:1">
        <div class="bi-name">${item.name}</div>
        <div class="bi-price">₹${item.price} × ${item.qty}</div>
      </div>
      <div class="qty-stepper" style="transform:scale(0.85);transform-origin:right">
        <button class="qty-btn" data-dir="down" onclick="changeQty('${item.code}',-1)">−</button>
        <span class="qty-val">${item.qty}</span>
        <button class="qty-btn" data-dir="up" onclick="changeQty('${item.code}',1)">+</button>
      </div>
      <div class="bi-total">₹${(item.price * item.qty).toLocaleString('en-IN')}</div>
      <button class="bi-del" onclick="removeItem('${item.code}')">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/></svg>
      </button>
    </div>
  `).join('');
  updateBill();
}

function updateBill() {
  const sub = billItems.reduce((s, i) => s + i.price * i.qty, 0);
  const gst = Math.round(sub * 0.05);
  const disc = parseInt(document.getElementById('discount').value) || 0;
  const total = sub + gst - disc;
  document.getElementById('subtotal').textContent = '₹' + sub.toLocaleString('en-IN');
  document.getElementById('gst').textContent = '₹' + gst.toLocaleString('en-IN');
  document.getElementById('grand-total').textContent = '₹' + total.toLocaleString('en-IN');
  document.getElementById('pay-btn-amt').textContent = total.toLocaleString('en-IN');
}

function clearBill() { billItems = []; renderBill(); }

function collectPayment() {
  if (!billItems.length) { alert('Add items first'); return; }
  const btn = document.querySelector('.btn-primary');
  btn.textContent = '✓ Payment Done!';
  btn.style.background = 'var(--accent)';
  btn.style.color = '#000';
  setTimeout(() => { window.location.href = '06-send-bill.html'; }, 800);
}

// Pre-fill demo items
addByBarcode('8901030874628');
addByBarcode('8906002480012');
addByBarcode('8901491503009');
</script>
</body>
</html>
